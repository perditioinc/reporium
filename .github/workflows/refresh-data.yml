name: Refresh Library Data

on:
  schedule:
    - cron: '0 6 * * *'    # Daily at 6am UTC  → quick run (Mon-Sat)
    - cron: '0 4 * * 0'    # Sunday at 4am UTC → weekly run (tier 2+3 refresh)
  workflow_dispatch:         # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for detect-trends
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate library data
        env:
          NEXT_PUBLIC_REPORIUM_API_URL: ${{ secrets.NEXT_PUBLIC_REPORIUM_API_URL }}
        run: |
          # fetch-library.ts: one API call to /library/full (~3s, no GitHub API rate limit cost)
          npm run generate
      - name: Validate library data
        run: npm run validate
      - name: Detect trends
        run: npm run detect-trends
      - name: Build gap analysis
        run: npm run gap-analysis
      - name: Generate digest
        run: npm run digest
      - name: Commit updated data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/library.json public/data/trends.json DIGEST.md
          git commit -m "chore: refresh library data $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
