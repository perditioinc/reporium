name: Refresh Library Data

on:
  schedule:
    - cron: '0 6 * * *'    # Daily at 6am UTC  → quick run (Mon-Sat)
    - cron: '0 4 * * 0'    # Sunday at 4am UTC → weekly run (tier 2+3 refresh)
  workflow_dispatch:         # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for detect-trends
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate library data (quick on weekdays, weekly on Sunday)
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Detect which cron fired: Sunday = weekly run, otherwise quick run.
          # --full is reserved as a manual-only option (trigger workflow_dispatch with full flag if needed).
          DAY=$(date -u +%u)  # 1=Mon … 7=Sun
          if [ "$DAY" = "7" ]; then
            echo "Sunday — running weekly generate (tier 2 + tier 3 refresh)"
            npm run generate:weekly
          else
            echo "Weekday — running quick generate (tier 3 only)"
            npm run generate:quick
          fi
      - name: Validate library data
        run: npm run validate
      - name: Detect trends
        run: npm run detect-trends
      - name: Build gap analysis
        run: npm run gap-analysis
      - name: Generate digest
        run: npm run digest
      - name: Commit updated data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/library.json public/data/trends.json DIGEST.md
          git commit -m "chore: refresh library data $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
